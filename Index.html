<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTG GIFT SHOP - DOITHE1S NEW SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');
        :root { --cute-pink: #ff9a9e; --pt-blue: #4ecdc4; --pt-red: #ff6b6b; --pt-yellow: #ffe66d; }
        
        body {
            font-family: 'Quicksand', sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #444;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        h1 { font-size: 2.5em; color: #fff; text-shadow: 3px 3px 0px var(--pt-red); text-align: center; margin-bottom: 5px; }
        .subtitle { background: #fff; padding: 5px 20px; border-radius: 20px; color: var(--pt-red); font-weight: bold; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* GRID QUÀ TẶNG - CHỈ ZOOM & VIỀN ĐỎ */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; margin-bottom: 40px; }
        .product-card { 
            background: rgba(255, 255, 255, 0.85); border-radius: 20px; padding: 15px; text-align: center; 
            cursor: pointer; border: 3px solid transparent; transition: all 0.3s ease; 
        }
        .product-card:hover { transform: scale(1.05); background: #fff; }
        .product-card.selected { 
            border-color: var(--pt-red); background: #fff; box-shadow: 0 0 20px var(--pt-red); 
            transform: scale(1.15); z-index: 10;
        }
        .product-img { width: 100%; height: 120px; object-fit: contain; border-radius: 10px; }
        .product-name { font-weight: 700; font-size: 0.85em; margin-top: 10px; min-height: 35px; display: flex; align-items: center; justify-content: center; }

        .input-box { background: #fff; padding: 30px; border-radius: 30px; border: 3px solid var(--cute-pink); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input, select { width: 90%; padding: 12px; border: 2px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; font-family: inherit; text-align: center; }
        button { background: linear-gradient(45deg, var(--pt-red), var(--cute-pink)); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 450px; background: #fff; border-radius: 30px; padding: 20px;
            z-index: 10000; box-shadow: 0 0 0 1000px rgba(0,0,0,0.85); text-align: center; border: 5px solid var(--cute-pink);
            max-height: 90vh; overflow-y: auto;
        }

        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .tab-btn { padding: 8px 15px; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 15px; border: 2px solid #ddd; background: #f9f9f9; }
        .tab-btn.active { background: var(--pt-red); color: white; border-color: var(--pt-red); }

        .pay-section { display: none; }
        .pay-section.active { display: block; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--pt-blue); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 11000; top: -10px; border-radius: 50%; }
    </style>
</head>
<body>

    <h1>PTG GIFT SHOP</h1>
    <div class="subtitle">✨ Quà Tặng Từ Nhà Sáng Tạo PTG ✨</div>

    <div class="product-grid" id="grid"></div>

    <div class="input-box">
        <h3 style="margin-top:0">🎁 NHẬN QUÀ NGAY 🎁</h3>
        <input type="text" id="userId" placeholder="Nhập ID Play Together...">
        <button onclick="openMainModal()">NHẬN QUÀ</button>
    </div>

    <div id="mainModal" class="modal">
        <div class="tab-container">
            <div id="tabBank" class="tab-btn active" onclick="switchTab('bank')">Chuyển Khoản</div>
            <div id="tabCard" class="tab-btn" onclick="switchTab('card')">Nạp Thẻ Cào</div>
        </div>

        <p style="font-size: 13px; margin-bottom: 15px;">ID của bạn: <b id="displayId" style="color:blue"></b></p>

        <div id="sectionBank" class="pay-section active">
            <img src="https://i.postimg.cc/brhVmFyq/IMG-2727.jpg" style="width: 180px; border-radius: 15px; border: 2px solid var(--pt-blue);">
            <p style="font-size: 11px;">Nội dung CK: <b id="payContent" style="color:red"></b></p>
            <input type="file" id="fileInput" accept="image/*" onchange="loadPreview(this)">
            <div id="aiLoader" class="loader"></div>
            <p id="aiStatus" style="font-size: 11px; font-weight: bold; min-height: 20px;"></p>
            <button onclick="runAI()" style="width: 100%; background: var(--pt-blue);">AI XÁC THỰC BILL</button>
        </div>

        <div id="sectionCard" class="pay-section">
            <select id="cardType">
                <option value="VIETTEL">Viettel</option>
                <option value="MOBIFONE">Mobifone</option>
                <option value="VINAPHONE">Vinaphone</option>
                <option value="ZING">Thẻ Zing</option>
                <option value="GARENA">Thẻ Garena</option>
            </select>
            <select id="cardValue">
                <option value="50000">50.000đ</option>
                <option value="100000">100.000đ</option>
                <option value="200000">200.000đ</option>
                <option value="500000">500.000đ</option>
                <option value="1000000">1.000.000đ</option>
            </select>
            <input type="text" id="cardSeri" placeholder="Số Seri thẻ...">
            <input type="text" id="cardCode" placeholder="Mã thẻ...">
            <button id="btnNapThe" onclick="processCard()" style="width: 100%;">GỬI THẺ XÁC NHẬN</button>
            <div id="cardLoader" class="loader"></div>
            <p id="cardStatus" style="font-size: 11px; margin-top: 10px; color:#666">Thẻ được duyệt tự động qua Doithe1s.</p>
        </div>

        <p onclick="closeModals()" style="cursor:pointer; font-size:0.8em; color:#999; margin-top:15px;">[ Hủy ]</p>
    </div>

    <div id="otpModal" class="modal">
        <h2 style="color:green">✅ HỢP LỆ</h2>
        <p>Hệ thống đã nhận được yêu cầu.<br>Nhập mã OTP để nhận quà ngay:</p>
        <input type="text" id="otpIn" placeholder="Mã OTP 6 số...">
        <button onclick="checkOtp()" style="width: 100%; background: var(--pt-red);">KÍCH HOẠT QUÀ</button>
    </div>

    <div id="successModal" class="modal">
        <h2>🎉 THÀNH CÔNG 🎉</h2>
        <p>Gói quà: <strong id="resGift"></strong><br>ID người nhận: <strong id="resId" style="color:red"></strong></p>
        <button onclick="location.reload()" style="width: 100%;">TIẾP TỤC</button>
    </div>

    <script>
        // CẬP NHẬT PARTNER ID & KEY TỪ ẢNH MỚI CỦA BẠN
        const PARTNER_ID = '71735891317'; 
        const PARTNER_KEY = '8405bb5cea8dc82cf1802c53f6beed9b';

        const products = [
            { name: "Bunny Xanh", img: "https://i.postimg.cc/SR9rYrwg/IMG-3237.png" },
            { name: "Thiên Bình Nữ", img: "https://i.postimg.cc/vTyD0KF2/IMG-3242.png" },
            { name: "Thú Blue Dragon", img: "https://i.postimg.cc/YSY10B21/IMG-3146.png" },
            { name: "Tay Đua Bầu Trời", img: "https://i.postimg.cc/L6FdrHct/IMG-3147.png" },
            { name: "Gói LOOK! Hipster", img: "https://i.postimg.cc/x8rhcLS4/IMG-3137.png" },
            { name: "Máy Bay Mây", img: "https://i.postimg.cc/7PgSFSfy/IMG-3138.png" },
            { name: "Gấu Mèo Mê Ngủ", img: "https://i.postimg.cc/cCtGsL7F/gau-meo-me-ngu.png" },
            { name: "Giọt Nước Linh Tinh VIP", img: "https://i.postimg.cc/pV7X00tH/IMG-3050.png" },
            { name: "Rose Đang Yêu", img: "https://i.postimg.cc/rwr7cKkc/IMG-3084.png" },
            { name: "Chuột Quý Ông", img: "https://i.postimg.cc/ZKRSkbnC/IMG-3085.png" },
            { name: "Nàng Thơ Đen Huyền", img: "https://i.postimg.cc/R0njZTDH/IMG-3052.png" },
            { name: "Mèo Ngoạm Đầu", img: "https://i.postimg.cc/Yq50SdX3/IMG-3051.png" },
            { name: "Kênh Lookbook", img: "https://i.postimg.cc/zDWYyVZS/IMG-3033.png" },
            { name: "Cần Câu Ngọc Rồng", img: "https://i.postimg.cc/NLhqLvbz/can-cau-ngoc-rong.png" },
            { name: "Blockcore", img: "https://i.postimg.cc/63mNJvZB/Blockcore.png" },
            { name: "Bác Sỹ Vụng Về", img: "https://i.postimg.cc/BtW9tfNM/bac-sy-vung-ve.png" },
            { name: "Cần câu búa vàng", img: "https://i.postimg.cc/7YxyPMJ1/IMG-1867.png" },
            { name: "Supreme Roadster Cực Quang", img: "https://i.postimg.cc/P51mpy11/IMG-2118.png" },
            { name: "Mùa Vọng Lâu Thiếu Gia Hổ", img: "https://i.postimg.cc/zfJRLrJF/IMG-2119.png" },
            { name: "Cô gái xác ướp", img: "https://i.postimg.cc/vmmwpwzM/IMG-2034.png" },
            { name: "Mèo kẹo sao", img: "https://i.postimg.cc/K8Z6MhCT/IMG-1962.png" },
            { name: "Thỏ cưng tưng tưng", img: "https://i.postimg.cc/cLn5j3X4/IMG-2052.png" },
            { name: "Thiên thần thỏ", img: "https://i.postimg.cc/6qPYb6ZS/IMG-2051.png" },
            { name: "Nini rưng rưng", img: "https://i.postimg.cc/PxrytvQH/IMG-2050.png" },
            { name: "Angel mate", img: "https://i.postimg.cc/0N9dfK3K/IMG-1865.png" },
            { name: "Tay đua vũ trụ", img: "https://i.postimg.cc/q755y9Qf/IMG-2084.png" },
            { name: "Vợt ánh sao mơ màng", img: "https://i.postimg.cc/T3P00tpF/IMG-2083.png" }
        ];

        let selectedPackage = "";
        const grid = document.getElementById('grid');

        // Tạo Grid Quà
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<img src="${p.img}" class="product-img"><div class="product-name">${p.name}</div>`;
            card.onclick = function() {
                document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                selectedPackage = p.name;
            };
            grid.appendChild(card);
        });

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.pay-section').forEach(s => s.classList.remove('active'));
            if(type === 'bank') {
                document.getElementById('tabBank').classList.add('active');
                document.getElementById('sectionBank').classList.add('active');
            } else {
                document.getElementById('tabCard').classList.add('active');
                document.getElementById('sectionCard').classList.add('active');
            }
        }

        function openMainModal() {
            const id = document.getElementById('userId').value;
            if(!id || !selectedPackage) return alert("Vui lòng nhập ID và chọn quà!");
            document.getElementById('displayId').innerText = id;
            document.getElementById('payContent').innerText = "PTG " + id;
            document.getElementById('mainModal').style.display = 'block';
        }

        // --- XỬ LÝ NẠP THẺ (API DOITHE1S) ---
        async function processCard() {
            const type = document.getElementById('cardType').value;
            const value = document.getElementById('cardValue').value;
            const seri = document.getElementById('cardSeri').value.trim();
            const code = document.getElementById('cardCode').value.trim();
            const btn = document.getElementById('btnNapThe');
            const loader = document.getElementById('cardLoader');
            const status = document.getElementById('cardStatus');

            if(seri.length < 5 || code.length < 5) return alert("Vui lòng nhập đầy đủ thông tin thẻ!");

            btn.disabled = true;
            loader.style.display = "block";
            status.innerText = "Đang gửi thẻ sang Doithe1s...";

            const requestId = Math.floor(Math.random() * 999999999).toString();
            const sign = md5(PARTNER_KEY + code + seri);

            try {
                const response = await fetch('https://doithe1s.vn/api/card-auto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: type, amount: value, serial: seri, code: code,
                        partner_id: PARTNER_ID, request_id: requestId, sign: sign
                    })
                });

                const data = await response.json();

                if (data.status === 1) {
                    status.innerText = "✅ Thẻ đúng! Đang chuyển hướng...";
                    setTimeout(() => {
                        document.getElementById('mainModal').style.display = 'none';
                        document.getElementById('otpModal').style.display = 'block';
                    }, 2000);
                } else {
                    status.innerText = "❌ Lỗi: " + data.message;
                    btn.disabled = false;
                    loader.style.display = "none";
                }
            } catch (e) {
                status.innerText = "❌ Lỗi kết nối API. (Cần chạy trên web thật)";
                btn.disabled = false;
                loader.style.display = "none";
            }
        }

        // --- XỬ LÝ AI QUÉT BILL ---
        async function runAI() {
            const file = document.getElementById('fileInput').files[0];
            const userId = document.getElementById('userId').value.toLowerCase().trim();
            const status = document.getElementById('aiStatus');
            if(!file) return alert("Vui lòng chọn ảnh Bill!");

            status.innerText = "🤖 AI đang kiểm tra bill...";
            document.getElementById('aiLoader').style.display = "block";

            try {
                const result = await Tesseract.recognize(file, 'eng+vie');
                const text = result.data.text.toLowerCase().replace(/\s+/g, '');
                const cleanId = userId.replace(/\s+/g, '');

                if ((text.includes("thànhcông") || text.includes("success")) && text.includes(cleanId)) {
                    status.innerText = "✅ BILL HỢP LỆ!";
                    setTimeout(() => {
                        document.getElementById('mainModal').style.display = 'none';
                        document.getElementById('otpModal').style.display = 'block';
                    }, 2000);
                } else {
                    status.innerText = "❌ Bill không chính xác hoặc sai ID!";
                    document.getElementById('aiLoader').style.display = "none";
                }
            } catch (e) { alert("Lỗi AI!"); }
        }

        function checkOtp() {
            const otp = document.getElementById('otpIn').value;
            const valids = ["241014", "515278", "727516", "961836", "614396", "317241"];
            if(valids.includes(otp)) {
                document.getElementById('otpModal').style.display = 'none';
                document.getElementById('resId').innerText = document.getElementById('userId').value;
                document.getElementById('resGift').innerText = selectedPackage;
                document.getElementById('successModal').style.display = 'block';
                for(let i=0; i<80; i++) createConfetti();
            } else { alert("Mã OTP không đúng!"); }
        }

        function loadPreview(input) { /* Preview ảnh nếu cần */ }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function createConfetti() {
            const c = document.createElement('div'); c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#ff9a9e','#4ecdc4','#ffe66d','#ff6b6b'][Math.floor(Math.random()*4)];
            document.body.appendChild(c);
            c.animate([{ transform: 'translateY(0)', opacity: 1 }, { transform: `translateY(100vh)`, opacity: 0 }], { duration: 3000 });
            setTimeout(() => c.remove(), 3000);
        }
    </script>
</body>
</html>
