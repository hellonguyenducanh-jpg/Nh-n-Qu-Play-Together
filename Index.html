<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTG GIFT SHOP - HỆ THỐNG XÁC THỰC OTP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        :root {
            --cute-pink: #ff9a9e;
            --cute-purple: #fad0c4;
            --pt-yellow: #ffe66d;
            --pt-blue: #4ecdc4;
            --pt-red: #ff6b6b;
        }

        /* NỀN CHUYỂN ĐỘNG CỰC CUTE */
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
            color: #444;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 2.8em;
            color: #fff;
            text-shadow: 3px 3px 0px var(--pt-red), 6px 6px 0px rgba(0,0,0,0.1);
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            color: var(--pt-red);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        /* LƯỚI SẢN PHẨM */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 40px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            border: 4px solid transparent;
        }

        .product-card:hover { transform: translateY(-10px); background: #fff; }

        .product-img { width: 100%; height: 140px; object-fit: contain; margin-bottom: 10px; border-radius: 15px; }

        .product-name { font-weight: 700; color: #444; font-size: 0.9em; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* VIỀN CHẠY KHI NHẤN */
        .product-card.active::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 30px;
            padding: 4px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            background-size: 300% 100%;
            animation: borderRun 0.8s linear infinite, fadeOut 0.8s forwards;
        }

        @keyframes borderRun { from { background-position: 0 0; } to { background-position: 300% 0; } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* KHU VỰC NHẬP ID */
        .input-box {
            background: #fff;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 3px solid var(--cute-pink);
        }

        input {
            width: 80%;
            padding: 15px;
            border: 3px solid #f0f0f0;
            border-radius: 15px;
            font-size: 1.1em;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
            font-family: inherit;
        }

        button {
            background: linear-gradient(45deg, var(--pt-red), var(--cute-pink));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,107,107,0.3);
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); }

        /* BẢNG OTP VÀ THÀNH CÔNG (POPUP NGANG) */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 550px; /* Dạng ngang chuyên nghiệp */
            background: #fff;
            border-radius: 35px;
            padding: 40px 20px;
            z-index: 9999;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1000px rgba(0,0,0,0.6);
            text-align: center;
            border: 6px solid var(--cute-pink);
        }

        .modal h2 { margin: 0; color: var(--pt-red); font-size: 2em; }
        .modal p { font-size: 1.2em; color: #555; margin: 15px 0; }

        .btn-confirm { background: var(--pt-blue); color: white; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-weight: bold; border: none; margin-top: 10px; text-transform: uppercase; }

        .confetti { position: fixed; width: 12px; height: 12px; z-index: 10000; top: -10px; }
    </style>
</head>
<body>

    <h1>PTG GIFT SHOP</h1>
    <div class="subtitle">✨ Quà Tặng Từ Nhà Sáng Tạo PTG ✨</div>

    <div class="product-grid" id="grid"></div>

    <div class="input-box">
        <h3 style="margin-top:0">🎁 NHẬP ID ĐỂ NHẬN QUÀ 🎁</h3>
        <input type="text" id="userId" placeholder="Nhập ID Play Together của bạn...">
        <br>
        <button onclick="showOtpModal()">TIẾP TỤC</button>
    </div>

    <div id="otpModal" class="modal">
        <h2>🔐 XÁC THỰC MÃ OTP</h2>
        <p>Vui lòng nhập mã OTP lấy từ <b>Nhà sáng tạo PTG</b>:</p>
        <input type="text" id="otpInput" placeholder="Nhập mã OTP gồm 6 số..." style="border: 2px solid var(--pt-blue);">
        <br>
        <button class="btn-confirm" onclick="verifyOtp()">XÁC NHẬN MÃ</button>
        <p style="font-size: 0.9em; color: #999; cursor: pointer; margin-top: 15px;" onclick="closeModals()">[ Hủy giao dịch ]</p>
    </div>

    <div id="successModal" class="modal">
        <h2>🎉 CHÚC MỪNG 🎉</h2>
        <p>Mã OTP hợp lệ! Quà tặng đang được chuyển tới tài khoản:<br><strong id="resId" style="color:var(--pt-red); font-size:1.5em;"></strong></p>
        <button class="btn-confirm" style="background:var(--pt-red)" onclick="closeModals()">OK CHỐT LUÔN!</button>
    </div>

    <script>
        const products = [
            { name: "Bunny Xanh", img: "https://i.postimg.cc/SR9rYrwg/IMG-3237.png" },
            { name: "Thú Blue Dragon", img: "https://i.postimg.cc/YSY10B21/IMG-3146.png" },
            { name: "Tay Đua Bầu Trời", img: "https://i.postimg.cc/L6FdrHct/IMG-3147.png" },
            { name: "Gói LOOK! Hipster", img: "https://i.postimg.cc/x8rhcLS4/IMG-3137.png" },
            { name: "Máy Bay Mây", img: "https://i.postimg.cc/7PgSFSfy/IMG-3138.png" },
            { name: "Gấu Mèo Mê Ngủ", img: "https://i.postimg.cc/cCtGsL7F/gau-meo-me-ngu.png" },
            { name: "Giọt Nước Linh Tinh VIP", img: "https://i.postimg.cc/pV7X00tH/IMG-3050.png" },
            { name: "Rose Đang Yêu", img: "https://i.postimg.cc/rwr7cKkc/IMG-3084.png" },
            { name: "Chuột Quý Ông", img: "https://i.postimg.cc/ZKRSkbnC/IMG-3085.png" },
            { name: "Nàng Thơ Đen Huyền", img: "https://i.postimg.cc/R0njZTDH/IMG-3052.png" },
            { name: "Mèo Ngoạm Đầu", img: "https://i.postimg.cc/Yq50SdX3/IMG-3051.png" },
            { name: "Kênh Lookbook", img: "https://i.postimg.cc/zDWYyVZS/IMG-3033.png" },
            { name: "Cần Câu Ngọc Rồng", img: "https://i.postimg.cc/NLhqLvbz/can-cau-ngoc-rong.png" },
            { name: "Blockcore", img: "https://i.postimg.cc/63mNJvZB/Blockcore.png" },
            { name: "Bác Sỹ Vụng Về", img: "https://i.postimg.cc/BtW9tfNM/bac-sy-vung-ve.png" }
        ];

        const grid = document.getElementById('grid');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = function() {
                this.classList.remove('active');
                void this.offsetWidth; 
                this.classList.add('active');
            };
            card.innerHTML = `<img src="${p.img}" class="product-img"><div class="product-name">${p.name}</div>`;
            grid.appendChild(card);
        });

        // 1. Mở modal nhập OTP
        function showOtpModal() {
            const id = document.getElementById('userId').value;
            if(!id) return alert("Bạn chưa nhập ID Play Together kìa!");
            document.getElementById('otpModal').style.display = 'block';
        }

        // 2. Xác thực OTP từ danh sách bạn cung cấp
        function verifyOtp() {
            const otpValue = document.getElementById('otpInput').value;
            // DANH SÁCH MÃ OTP HỢP LỆ
            const validOtps = ["254716", "515278", "727516", "961836", "614396", "317241"];

            if(validOtps.includes(otpValue)) {
                document.getElementById('otpModal').style.display = 'none';
                document.getElementById('resId').innerText = document.getElementById('userId').value;
                document.getElementById('successModal').style.display = 'block';
                // Bùng nổ pháo hoa giấy
                for(let i=0; i<80; i++) createConfetti();
            } else {
                alert("Mã OTP không chính xác hoặc đã hết hạn!");
                document.getElementById('otpInput').value = "";
            }
        }

        function closeModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('otpInput').value = "";
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = ['#ff9a9e','#fad0c4','#ffe66d','#4ecdc4','#ff6b6b'][Math.floor(Math.random()*5)];
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0%';
            document.body.appendChild(c);
            c.animate([
                { transform: 'translateY(0) rotate(0)', opacity: 1 },
                { transform: `translateY(100vh) rotate(${Math.random()*720}deg)`, opacity: 0 }
            ], { duration: 2000 + Math.random()*2000 });
            setTimeout(() => c.remove(), 4500);
        }
    </script>
</body>
</html>
